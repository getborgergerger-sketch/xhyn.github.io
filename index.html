<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Congratulations</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #fff;
  color: #111;
  overflow: hidden;
}

/* BACKGROUND */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
  opacity: 0.6;
}

body::before {
  background: radial-gradient(circle, #ff6fb1, #ffb6d9);
  top: -100px;
  left: -120px;
}

body::after {
  background: radial-gradient(circle, #ff4d8d, #ffc1e3);
  bottom: -120px;
  right: -100px;
}

/* HEARTS */
#heartCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
}

/* INTRO */
.intro {
  height: 120vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* ⭐ TITLE UPDATED */
.intro h1 {
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 2rem;
  letter-spacing: 1px;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

/* SCROLL */
.scroll {
  margin-top: 20px;
  font-size: 0.9rem;
  opacity: 0;
  color: #777;
}

.scroll.show {
  animation: fadeIn 1.5s forwards;
}

/* POST */
.post-section {
  padding: 80px 15px 120px;
  display: flex;
  justify-content: center;
}

.post {
  width: 100%;
  max-width: 400px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  overflow: hidden;
  border: 1px solid #eee;

  opacity: 0;
  transform: scale(0.95) translateY(20px);
  transition: 0.8s ease;
}

.post.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.post-header {
  display: flex;
  align-items: center;
  padding: 12px;
  gap: 10px;
}

.post-header img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.post-image {
  width: 100%;
  display: block;
}

/* ICONS */
.icons {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  font-size: 1.2rem;
}

.left-icons {
  display: flex;
  gap: 12px;
}

.count {
  font-size: 0.8rem;
  color: #666;
}

/* BUTTON */
.btn {
  margin: 15px auto;
  display: block;
  padding: 10px 16px;
  border: none;
  border-radius: 20px;
  background: #f2f2f2;
  cursor: pointer;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}

.btn.show {
  opacity: 1;
  transform: translateY(0);
}

/* COMMENT */
.comment-box {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transform: translateY(-10px);
  transition: all 0.5s ease;
  padding: 0 12px;
}

.comment-box.open {
  max-height: 300px;
  opacity: 1;
  transform: translateY(0);
  padding: 12px;
}

.comment-inner {
  background: #fafafa;
  border-radius: 10px;
  padding: 12px;
  font-size: 0.9rem;
  color: #444;
  border: 1px solid #eee;
  white-space: pre-line;
}

/* ANIMATION */
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="heartCanvas"></canvas>

<div class="content">

<section class="intro">
  <h1>CONGRATULATIONS, JEWEL!</h1>
  <div id="scrollText" class="scroll">scroll ↓</div>
</section>

<section class="post-section">
  <div>

    <div id="post" class="post">

      <div class="post-header">
        <img src="https://img.sanishtech.com/u/7903c39ef2269bef662e781577172727.jpg">
        <strong>someone_special</strong>
      </div>

      <img class="post-image" src="https://image2url.com/r2/default/images/1774807295059-1bc491e5-5a36-4634-b2fc-6fde7223d22c.png">

      <div class="icons">
        <div class="left-icons">
          <span>❤️ <span class="count" data-target="6">0</span></span>
          <span>💬 <span class="count" data-target="7">0</span></span>
        </div>
        <div>
          ↗ <span class="count" data-target="67">0</span>
        </div>
      </div>

      <div id="commentBox" class="comment-box">
        <div id="commentText" class="comment-inner"></div>
      </div>

    </div>

    <button id="btn" class="btn">check comment</button>
  </div>
</section>

</div>

<script>
document.body.style.overflow = "hidden";

const scrollText = document.getElementById("scrollText");
const btn = document.getElementById("btn");
const box = document.getElementById("commentBox");
const post = document.getElementById("post");
const commentText = document.getElementById("commentText");

setTimeout(() => {
  scrollText.classList.add("show");
  document.body.style.overflow = "auto";
  post.classList.add("show");
}, 3000);

setTimeout(() => {
  btn.classList.add("show");
}, 6000);

function animateCount(el) {
  const target = +el.getAttribute("data-target");
  let count = 0;
  const speed = 40;

  const update = () => {
    count++;
    el.textContent = count;
    if (count < target) setTimeout(update, speed);
  };

  update();
}

setTimeout(() => {
  document.querySelectorAll(".count").forEach(animateCount);
}, 3500);

function typeText(text, el, speed = 30) {
  let i = 0;
  el.textContent = "";
  function typing() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(typing, speed);
    }
  }
  typing();
}

btn.addEventListener("click", () => {
  box.classList.toggle("open");

  if (box.classList.contains("open")) {
    typeText(`Heyya, Jewel!

I want to take a moment to express my sincere appreciation for you finishing this school year :)

alam ko na there were late night studies, stress, kulang sa tulog, and sacrifices you made to reach this moment

and proud na proud ako sa'yo, even when you doubt yourself. I’ll be lowkey cheering and rooting for you in the future. keep shining and continue chasing your dreams!!!!!!!!!

I’ll be your biggest supporter hehe :) plus, I made a hirono version of you because you deserve it :P

plus, I made a hirono version of you because you deserve it :P`

, commentText);
  } else {
    commentText.textContent = "";
  }
});

/* HEARTS */
const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const hearts = [];

function createHeart() {
  return {
    x: Math.random() * canvas.width,
    y: canvas.height + 20,
    size: Math.random() * 18 + 8,
    speedY: Math.random() * 1.5 + 0.5,
    speedX: (Math.random() - 0.5) * 0.6,
    alpha: Math.random() * 0.5 + 0.3
  };
}

function drawHeart(x, y, size, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "#ff6b81";

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - size/2, y - size/2,
                    x - size, y + size/3,
                    x, y + size);

  ctx.bezierCurveTo(x + size, y + size/3,
                    x + size/2, y - size/2,
                    x, y);
  ctx.fill();

  ctx.globalAlpha = 1;
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (hearts.length < 35) {
    hearts.push(createHeart());
  }

  for (let i = 0; i < hearts.length; i++) {
    const h = hearts[i];

    h.y -= h.speedY;
    h.x += h.speedX;

    drawHeart(h.x, h.y, h.size, h.alpha);

    if (h.y < -50) {
      hearts.splice(i, 1);
      i--;
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
